name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Configure NuGet auth
        run: >
          dotnet nuget update source github
          --username ${{ github.actor }}
          --password ${{ secrets.KUESTENLOGIK_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Kuestenlogik.Surgewave.Connectors.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.Connectors.slnx --no-restore -c Release

      # xUnit v3 + Microsoft.Testing.Platform (MTP): klassisches
      # `--collect "XPlat Code Coverage"` von VSTest funktioniert NICHT
      # mehr, MTP ignoriert das stumm und schreibt nichts.
      # Stattdessen `--` Separator + MTP-native Coverage-Args:
      # `--coverage --coverage-output-format cobertura`. Erfordert
      # die PackageReference `Microsoft.Testing.Extensions.CodeCoverage`
      # in den Test-Projekten (zentral via tests/Directory.Build.props).
      #
      # Filter via MTP geht ueber `--filter-trait` / `--filter-class`
      # statt VSTest's `--filter`; Integration-Test-Exclude darum hier
      # ueber das `FullyQualifiedName` per `--filter` — wenn das ueber
      # MTP nicht greift, faengt die nachgelagerte Integration-Trait-
      # Pruefung das auf.
      - name: Run tests with coverage
        run: |
          mkdir -p artifacts/coverage/raw
          dotnet test Kuestenlogik.Surgewave.Connectors.slnx -c Release --no-build \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --verbosity minimal \
            -- \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output-folder $(pwd)/artifacts/coverage/raw

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'artifacts/coverage/raw/**/*.cobertura.xml'
          targetdir: 'artifacts/coverage/report'
          reporttypes: 'Html;Badges;TextSummary;MarkdownSummaryGithub'
          assemblyfilters: '+Kuestenlogik.Surgewave.Connector.*;-*.Tests;-*.Benchmarks'
          classfilters: '-*.Program;-*.Startup'

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f "artifacts/coverage/report/Summary.txt" ]; then
            echo "## Coverage Summary"
            cat artifacts/coverage/report/Summary.txt
          fi

      # Coverage-Floor — verhindert dass die Cross-Connector-Coverage
      # weiter abrutscht. Initial-Werte sind absichtlich niedrig
      # gesetzt: 45 von 118 Connectors haben heute *gar kein*
      # Test-Projekt, das druckt die Numbers nach unten. Wenn die
      # fehlenden Test-Projekte angelegt sind, kann der Threshold
      # iterativ in 5er-Schritten hochgezogen werden.
      - name: Enforce coverage thresholds
        if: always()
        run: |
          set -euo pipefail
          SUMMARY=artifacts/coverage/report/Summary.txt
          if [ ! -f "$SUMMARY" ]; then
            echo "::error::Coverage summary not found at $SUMMARY — did ReportGenerator run?"
            exit 1
          fi
          LINE=$(grep -E '^\s*Line coverage:' "$SUMMARY" | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -1)
          BRANCH=$(grep -E '^\s*Branch coverage:' "$SUMMARY" | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -1)
          if [ -z "$LINE" ] || [ -z "$BRANCH" ]; then
            echo "::error::Could not parse Line/Branch percentages from $SUMMARY"
            cat "$SUMMARY"
            exit 1
          fi
          MIN_LINE=20
          MIN_BRANCH=15
          echo "Line coverage:   ${LINE}% (min ${MIN_LINE}%)"
          echo "Branch coverage: ${BRANCH}% (min ${MIN_BRANCH}%)"
          BAD=0
          if awk "BEGIN { exit !($LINE < $MIN_LINE) }"; then
            echo "::error::Line coverage ${LINE}% is below the ${MIN_LINE}% threshold."
            BAD=1
          fi
          if awk "BEGIN { exit !($BRANCH < $MIN_BRANCH) }"; then
            echo "::error::Branch coverage ${BRANCH}% is below the ${MIN_BRANCH}% threshold."
            BAD=1
          fi
          if [ "$BAD" -eq 1 ]; then exit 1; fi
          echo "OK — both thresholds met."

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: artifacts/coverage/report/
          retention-days: 30

      - name: Upload coverage badges
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: coverage-badges
          path: |
            artifacts/coverage/report/badge_combined.svg
            artifacts/coverage/report/badge_linecoverage.svg
            artifacts/coverage/report/badge_branchcoverage.svg
            artifacts/coverage/report/badge_methodcoverage.svg
          retention-days: 90

      - name: Add coverage to PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          path: artifacts/coverage/report/SummaryGithub.md
