name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Configure NuGet auth
        run: >
          dotnet nuget update source github
          --username ${{ github.actor }}
          --password ${{ secrets.KUESTENLOGIK_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Kuestenlogik.Surgewave.Connectors.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.Connectors.slnx --no-restore -c Release

      # Coverage via coverlet.msbuild (MSBuild-driven). Funktioniert
      # mit xUnit v3 + Microsoft.Testing.Platform genauso wie mit
      # VSTest, weil Coverlet hier als MSBuild-Target laeuft, nicht
      # als VSTest-Collector.
      #
      # KEIN /p:MergeWith=... auf slnx-Ebene: jedes Test-Projekt
      # versucht in dieselbe Merge-Datei zu schreiben und ueber-
      # schreibt die anderen (letzter gewinnt, Coverage zeigt nur
      # 1 Assembly). Stattdessen RELATIVER CoverletOutput pro
      # Projekt — Coverlet legt seine .cobertura.xml im jeweiligen
      # Projekt-Verzeichnis ab, ReportGenerator sammelt alle via
      # `**/*.cobertura.xml`-Glob.
      - name: Run tests with coverage
        run: |
          dotnet test Kuestenlogik.Surgewave.Connectors.slnx -c Release --no-build \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --verbosity minimal \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage.cobertura.xml \
            /p:Include="[Kuestenlogik.Surgewave.Connector.*]*" \
            /p:Exclude="[*.Tests]*"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'tests/**/coverage.cobertura.xml'
          targetdir: 'artifacts/coverage/report'
          reporttypes: 'Html;Badges;TextSummary;MarkdownSummaryGithub'
          assemblyfilters: '+Kuestenlogik.Surgewave.Connector.*;-*.Tests;-*.Benchmarks'
          classfilters: '-*.Program;-*.Startup'

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f "artifacts/coverage/report/Summary.txt" ]; then
            echo "## Coverage Summary"
            cat artifacts/coverage/report/Summary.txt
          fi

      # Coverage-Floor — verhindert Regressionen ueber die aktuell
      # gemessene Baseline hinaus. Erst-Messung 2026-05-26:
      # Line 41.5 % / Branch 31.6 % auf 72 Connector-Assemblies
      # (von 118 — 45 haben heute kein Test-Projekt). Threshold ist
      # ~1.5pp unter Baseline gesetzt, sodass eine echte Regression
      # CI failt aber moderate Schwankungen toleriert werden.
      - name: Enforce coverage thresholds
        if: always()
        run: |
          set -euo pipefail
          SUMMARY=artifacts/coverage/report/Summary.txt
          if [ ! -f "$SUMMARY" ]; then
            echo "::error::Coverage summary not found at $SUMMARY — did ReportGenerator run?"
            exit 1
          fi
          LINE=$(grep -E '^\s*Line coverage:' "$SUMMARY" | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -1)
          BRANCH=$(grep -E '^\s*Branch coverage:' "$SUMMARY" | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -1)
          if [ -z "$LINE" ] || [ -z "$BRANCH" ]; then
            echo "::error::Could not parse Line/Branch percentages from $SUMMARY"
            cat "$SUMMARY"
            exit 1
          fi
          MIN_LINE=40
          MIN_BRANCH=30
          echo "Line coverage:   ${LINE}% (min ${MIN_LINE}%)"
          echo "Branch coverage: ${BRANCH}% (min ${MIN_BRANCH}%)"
          BAD=0
          if awk "BEGIN { exit !($LINE < $MIN_LINE) }"; then
            echo "::error::Line coverage ${LINE}% is below the ${MIN_LINE}% threshold."
            BAD=1
          fi
          if awk "BEGIN { exit !($BRANCH < $MIN_BRANCH) }"; then
            echo "::error::Branch coverage ${BRANCH}% is below the ${MIN_BRANCH}% threshold."
            BAD=1
          fi
          if [ "$BAD" -eq 1 ]; then exit 1; fi
          echo "OK — both thresholds met."

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: artifacts/coverage/report/
          retention-days: 30

      - name: Upload coverage badges
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: coverage-badges
          path: |
            artifacts/coverage/report/badge_combined.svg
            artifacts/coverage/report/badge_linecoverage.svg
            artifacts/coverage/report/badge_branchcoverage.svg
            artifacts/coverage/report/badge_methodcoverage.svg
          retention-days: 90

      - name: Add coverage to PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          path: artifacts/coverage/report/SummaryGithub.md
