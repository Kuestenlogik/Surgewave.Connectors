name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Configure NuGet auth
        run: dotnet nuget update source github --username beachwalker --password ${{ secrets.PACKAGES_TOKEN }} --store-password-in-clear-text --configfile nuget.config

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "VERSION=0.1.0-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Kuestenlogik.Surgewave.Connectors.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Surgewave.Connectors.slnx -c Release --no-restore -p:Version=$VERSION

      - name: Test
        run: dotnet test Kuestenlogik.Surgewave.Connectors.slnx -c Release --no-build -v normal

      - name: Pack NuGet
        run: dotnet pack Kuestenlogik.Surgewave.Connectors.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      - name: Pack .swpkg plugins
        # Each connector csproj inherits PackageReference Kuestenlogik.Surgewave.Build (PrivateAssets=all)
        # and Content Include for plugin.json + pluginsettings.json from Directory.Build.props.
        # 'dotnet publish -p:SurgewavePackPlugin=true' picks them up via the SurgewavePackPlugin
        # MSBuild target and writes one .swpkg per project to artifacts/pluginPackage/. The shell loop +
        # jq + manual zip layout that lived here previously is no longer needed.
        run: |
          set -e
          for proj in src/*/Kuestenlogik.Surgewave.Connector.*.csproj; do
            [ -f "$proj" ] || continue
            dir=$(dirname "$proj")
            [ -f "$dir/plugin.json" ] || continue
            dotnet publish "$proj" -c Release --no-build -p:SurgewavePackPlugin=true -p:Version=$VERSION
          done
          ls -la artifacts/pluginPackage/ | head -20

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

      - name: Upload .swpkg plugins
        uses: actions/upload-artifact@v7
        with:
          name: pluginPackage-plugins
          path: artifacts/pluginPackage/*.swpkg

      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/beachwalker/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
