<?xml version="1.0" encoding="UTF-8"?>
<!--
  Surgewave NuGet-Package-Icon (128×128).
  Quelle für scripts/generate-icon.js — wird zu ../icon.png gerendert
  und via Directory.Build.props in jedes Surgewave-NuGet eingebettet.

  Layout analog Bowire's bowire_logo_small.svg:
    - Gefüllter schwarzer Kreis (#000000, Radius 50 in einem 100x100 viewBox)
      — wie Bowire's small-Logo; fuegt sich auf dem dunklen nuget.org-
      Hintergrund ruhiger ein als das frühere Navy.
    - Surgewave-Mark zentriert, Wave hellblau (#33bcff), Ink weiß für
      maximalen Kontrast gegen den schwarzen Kreis.

  Diese Datei ist NuGet-spezifisch — das allgemeine adaptive
  Brand-Mark bleibt in images/mark_adaptive.svg (transparent, theme-aware).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Surgewave">
  <circle cx="50" cy="50" r="50" fill="#000000" />
  <!-- translate-Werte sind nicht das BBox-Center, sondern auf den
       visuellen Schwerpunkt des Marks ausgerichtet. Das Mark ist
       asymmetrisch (Wave-Tail oben-rechts klein, C-Body unten-links
       gross); naives BBox-Centering wirkt deshalb optisch nach
       links-unten verschoben. Korrektur via scripts/measure-icon.js
       gemessen: shift (+3.43, -1.78) gegenueber BBox-Center.

       Zusaetzlich ~2 units nach oben fuer "optical centering":
       in kreisformigen Containern wirkt der mathematisch zentrierte
       Inhalt fuer das menschliche Auge tendenziell zu tief; der
       leichte Upward-Bias bringt den wahrgenommenen Mittelpunkt
       auf den Kreis-Mittelpunkt. -->
